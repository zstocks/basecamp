<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basecamp — Settings</title>
  <link rel="stylesheet" href="/styles.css">
  <!-- favicons (splash links live on the launch pages: index + login) -->
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/favicon-96x96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#0d1117">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Basecamp">
</head>
<body>
  <header>
    <h1>Basecamp</h1>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a href="/habits.html">Habits</a>
      <a href="/workouts.html">Workouts</a>
      <a href="/stats.html">Stats</a>
      <a href="/settings.html" class="active" aria-current="page">Settings</a>
    </nav>
    <button id="logout-btn" class="ghost">Log out</button>
  </header>

  <main>
    <section class="card">
      <h2>Targets</h2>
      <p class="hint">Leave a field blank to clear it. These drive the dashboard goals and (later) trend charts.</p>
      <form id="settings-form" class="form">
        <div class="field">
          <label for="goal_weight">Goal weight (lb)</label>
          <input type="number" id="goal_weight" step="0.1" min="0" placeholder="—">
        </div>
        <div class="field">
          <label for="target_calories">Daily calories</label>
          <input type="number" id="target_calories" step="1" min="0" placeholder="—">
        </div>
        <div class="field">
          <label for="target_protein_g">Daily protein (g)</label>
          <input type="number" id="target_protein_g" step="1" min="0" placeholder="—">
        </div>
        <div class="field">
          <label for="target_water_ml">Daily water (ml)</label>
          <input type="number" id="target_water_ml" step="1" min="0" placeholder="—">
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">Save targets</button>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="/settings.js"></script>
</body>
</html>
