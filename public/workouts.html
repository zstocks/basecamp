<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basecamp — Workouts</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>Basecamp</h1>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a href="/habits.html">Habits</a>
      <a href="/workouts.html" class="active" aria-current="page">Workouts</a>
      <a href="/settings.html">Settings</a>
    </nav>
    <button id="logout-btn" class="ghost">Log out</button>
  </header>

  <main>
    <section class="card">
      <h2 id="form-title">Add a workout template</h2>
      <form id="template-form" class="form">
        <input type="hidden" id="template-id">

        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" required maxlength="120" autocomplete="off">
        </div>

        <div class="field">
          <label for="note">Note <span class="optional">(optional)</span></label>
          <input type="text" id="note" maxlength="280" autocomplete="off">
        </div>

        <div class="field">
          <label>Exercises <span class="optional">(name required; sets/reps/weight optional)</span></label>
          <div class="exercise-list" id="exercise-list"></div>
          <button type="button" id="add-exercise" class="ghost add-exercise">+ Add exercise</button>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn" class="primary">Add template</button>
          <button type="button" id="cancel-btn" class="ghost" hidden>Cancel</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h2>Active templates</h2>
      <ul class="manage-list" id="active-list"></ul>
      <p class="empty" id="active-empty" hidden>No templates yet.</p>
    </section>

    <section class="card" id="archived-card" hidden>
      <h2>Archived</h2>
      <ul class="manage-list" id="archived-list"></ul>
    </section>
  </main>

  <script type="module" src="/workouts.js"></script>
</body>
</html>
