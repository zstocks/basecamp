<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basecamp — Sign in</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center;
           font-family: system-ui, sans-serif; background: #0d1117; color: #e6edf3; }
    main { width: 100%; max-width: 320px; padding: 2rem 1.5rem; }
    h1 { margin: 0 0 1.5rem; font-size: 1.5rem; text-align: center; }
    label { display: block; font-size: 0.85rem; color: #8d96a0; margin-bottom: 0.4rem; }
    input { width: 100%; box-sizing: border-box; padding: 0.7rem 0.85rem;
            background: #161b22; color: #e6edf3; border: 1px solid #30363d;
            border-radius: 8px; font-size: 1rem; font-family: inherit; }
    input:focus { outline: none; border-color: #46c46c; }
    button { width: 100%; margin-top: 1rem; padding: 0.75rem; background: #46c46c;
             color: #0d1117; border: none; border-radius: 8px; font-size: 1rem;
             font-weight: 600; cursor: pointer; font-family: inherit; }
    .error { color: #f85149; font-size: 0.85rem; margin: 0.75rem 0 0; min-height: 1.2em; }
  </style>
</head>
<body>
  <main>
    <h1>Basecamp</h1>
    <form id="login-form">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus required>
      <button type="submit">Sign in</button>
      <p class="error" id="error"></p>
    </form>
  </main>
  <script>
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errEl.textContent = '';
      try {
        const res = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: form.password.value }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          const body = await res.json().catch(() => ({}));
          errEl.textContent = body.error || 'Sign in failed';
        }
      } catch {
        errEl.textContent = 'Network error';
      }
    });
  </script>
</body>
</html>
