<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Basecamp — Stats</title>
  <link rel="stylesheet" href="/styles.css">
  <!-- favicons & PWA -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <meta name="theme-color" content="#1f7a46">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Basecamp">
</head>
<body>
  <header>
    <h1>Basecamp</h1>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a href="/habits.html">Habits</a>
      <a href="/workouts.html">Workouts</a>
      <a href="/stats.html" class="active" aria-current="page">Stats</a>
      <a href="/settings.html">Settings</a>
    </nav>
    <button id="logout-btn" class="ghost">Log out</button>
  </header>

  <main>
    <nav class="subnav">
      <a href="/stats.html?tab=habits" id="tab-habits">Habits</a>
      <a href="/stats.html?tab=workouts" id="tab-workouts">Workouts</a>
      <a href="/stats.html?tab=diet" id="tab-diet">Diet</a>
    </nav>

    <section class="card" id="section-habits" hidden>
      <h2>Habit stats</h2>
      <p class="empty">Coming soon.</p>
    </section>

    <div id="section-workouts" hidden>
      <section class="card">
        <h2>Workout consistency</h2>
        <p class="hint" id="wk-summary">Loading…</p>
        <div class="heatmap" id="heatmap"></div>
        <div class="day-detail" id="day-detail"></div>
      </section>

      <section class="card">
        <h2>Exercise progress</h2>
        <div class="field">
          <label for="exercise-select">Exercise</label>
          <select id="exercise-select"></select>
        </div>
        <p class="hint" id="progress-hint" hidden>Top set per day (heaviest weight).</p>
        <div class="progress-list" id="progress-list"></div>
      </section>
    </div>

    <section class="card" id="section-diet" hidden>
      <h2>Diet stats</h2>
      <p class="empty">Coming in Phase 3.</p>
    </section>
  </main>

  <script type="module" src="/stats.js"></script>
</body>
</html>
