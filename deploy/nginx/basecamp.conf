# Nginx server block for basecamp.zacharystocks.com
# Deploy:
#   sudo cp ~/apps/basecamp/deploy/nginx/basecamp.conf /etc/nginx/sites-available/basecamp
#   sudo ln -s /etc/nginx/sites-available/basecamp /etc/nginx/sites-enabled/basecamp
#   sudo nginx -t && sudo systemctl reload nginx
#
# Uses the existing wildcard cert for *.zacharystocks.com (carried by
# snippets/ssl.conf) — no new certbot run, no new DNS record needed.

server {
    listen 80;
    server_name basecamp.zacharystocks.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name basecamp.zacharystocks.com;

    include snippets/ssl.conf;
    include snippets/security-headers.conf;

    # Inherited by the locations below.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Brute-force protection on the only unauthenticated endpoint. The app also
    # rate-limits logins itself (src/rateLimit.js); this is defense in depth.
    location = /login {
        limit_req zone=general burst=5 nodelay;
        proxy_pass http://127.0.0.1:3005;
    }

    location / {
        proxy_pass http://127.0.0.1:3005;
    }
}
